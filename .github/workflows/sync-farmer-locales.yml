name: Sync Farmer Locales to Kubernetes

on:
  workflow_dispatch:

env:
  DOCKER_IMAGE: qniranjan01/openg2p-registry-core-ui:develop
  EXTENSIONS_REPO: https://github.com/Q-Niranjan/openg2p-registry-gen2-extensions.git
  EXTENSIONS_BRANCH: develop
  EXTENSIONS_PATH: openg2p-registry-farmer-extension/locales
  NAMESPACE: dev
  DEPLOYMENT_NAME: registry-core-ui-farmer
  CONFIGMAP_NAME: registry-farmer-extension-locales

jobs:
  sync-farmer-locales:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout infra repo
      uses: actions/checkout@v3

    - name: Checkout extensions repo
      uses: actions/checkout@v3
      with:
        repository: Q-Niranjan/openg2p-registry-gen2-extensions
        ref: ${{ env.EXTENSIONS_BRANCH }}
        path: extensions-repo

    - name: Setup Docker
      uses: docker/setup-buildx-action@v3

    # --------------------------------------------------
    # Extract core locales from the built image
    # --------------------------------------------------
    - name: Extract core locales from Docker image
      run: |
        set -e
        echo "=== Pulling Docker image ==="
        docker pull ${{ env.DOCKER_IMAGE }}

        echo "=== Extracting core locales ==="
        docker create --name temp-core ${{ env.DOCKER_IMAGE }}
        mkdir -p core-locales
        docker cp temp-core:/app/locales/. core-locales/
        docker rm temp-core

        echo "Core locales:"
        ls -lh core-locales

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    # --------------------------------------------------
    # Merge locales (CI-time only)
    # --------------------------------------------------
    - name: Merge core + extension locales
      run: |
        set -e
        echo "=== Merging locales ==="

        mkdir -p merged-locales

        node << 'EOF'
        const fs = require('fs');
        const path = require('path');

        const coreDir = 'core-locales';
        const extDir = 'extensions-repo/${{ env.EXTENSIONS_PATH }}';
        const outDir = 'merged-locales';

        if (!fs.existsSync(extDir)) {
          console.error('❌ Extension locales directory not found:', extDir);
          process.exit(1);
        }

        const files = fs.readdirSync(extDir).filter(f => f.endsWith('.json'));
        if (files.length === 0) {
          console.error('❌ No extension locale files found');
          process.exit(1);
        }

        for (const file of files) {
          const corePath = path.join(coreDir, file);
          const extPath = path.join(extDir, file);

          const core = fs.existsSync(corePath)
            ? JSON.parse(fs.readFileSync(corePath, 'utf8'))
            : {};

          const ext = JSON.parse(fs.readFileSync(extPath, 'utf8'));

          const merged = { ...core, ...ext };

          fs.writeFileSync(
            path.join(outDir, file),
            JSON.stringify(merged, null, 2),
            'utf8'
          );

          console.log(`✓ ${file}: ${Object.keys(merged).length} keys`);
        }
        EOF

        echo "Merged locales:"
        ls -lh merged-locales

    # --------------------------------------------------
    # SAFETY CHECK (MANDATORY)
    # --------------------------------------------------
    - name: Validate merged locales
      run: |
        if [ -z "$(ls -A merged-locales/*.json 2>/dev/null)" ]; then
          echo "❌ No merged locale files found. Aborting."
          exit 1
        fi
        echo "✓ Locale validation passed"

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Configure Kubernetes access
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config

    # --------------------------------------------------
    # Create / Update ConfigMap
    # --------------------------------------------------
    - name: Create ConfigMap manifest
      run: |
        set -e
        cd merged-locales

        cat > /tmp/configmap.yaml <<EOF
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${{ env.CONFIGMAP_NAME }}
          namespace: ${{ env.NAMESPACE }}
          labels:
            app: ${{ env.DEPLOYMENT_NAME }}
            managed-by: github-actions
        data:
        EOF

        for f in *.json; do
          echo "  Adding $f"
          echo "  $f: |" >> /tmp/configmap.yaml
          sed 's/^/    /' "$f" >> /tmp/configmap.yaml
        done

    - name: Apply ConfigMap
      run: |
        kubectl apply -f /tmp/configmap.yaml
        echo "✓ ConfigMap applied"

    - name: Verify ConfigMap
      run: |
        kubectl get configmap ${{ env.CONFIGMAP_NAME }} \
          -n ${{ env.NAMESPACE }} \
          -o jsonpath='{.data}' | jq 'keys'

    # --------------------------------------------------
    # Restart (until checksum rollout is added)
    # --------------------------------------------------
    - name: Restart Deployment
      run: |
        kubectl rollout restart deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }}
        kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }} --timeout=5m

    - name: Done
      run: echo "✅ Farmer locales synced successfully"
